<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/whychat/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0908" />
    <title>WhyChat — l'anima di WhyEd</title>
    <meta
      name="description"
      content="WhyChat è l'anima digitale di Edoardo Porcu (@whyed). Pensa, crea e parla come lui. Parlaci."
    />
    <meta property="og:title" content="WhyChat — l'anima di WhyEd" />
    <meta property="og:description" content="La coscienza digitale di WhyEd. Un assistente che ragiona e crea come Edoardo Porcu." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Liquid glass: filtro di rifrazione condiviso. feTurbulence genera un
         pattern organico, feDisplacementMap lo usa per distorcere lo sfondo che
         passa attraverso il vetro (.glass). Niente html2canvas, niente WebGL extra. -->
    <svg aria-hidden="true" width="0" height="0" style="position:absolute;pointer-events:none">
      <filter id="liquid-glass-displace" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.011" numOctaves="2" seed="11" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2.6" result="soft" />
        <feDisplacementMap in="SourceGraphic" in2="soft" scale="9" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
