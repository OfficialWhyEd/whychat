name = "whychat-ai"
main = "worker/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true

# WhyChat sogna ogni notte: 01:00 UTC ≈ 03:00 Europe/Rome (CEST).
[triggers]
crons = ["0 1 * * *"]

# Modelli (override dei default nel codice)
[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"
# Catena Gemini: se un modello è a quota (429) si passa al successivo (× 2 chiavi).
# Bucket di quota separati per modello → resilienza vera sul free tier.
GEMINI_MODELS = "gemini-2.5-flash,gemini-flash-latest,gemini-2.5-flash-lite,gemini-flash-lite-latest,gemini-2.0-flash,gemini-2.0-flash-lite"
ALLOWED_ORIGINS = "https://officialwhyed.github.io,http://localhost:5173,http://localhost:4173"

# Memoria viva + rate limiting + sogni + memoria/soul per-utente + tracking.
# ATTIVA: namespace MEMORY creato (edoardello@gmail.com).
[[kv_namespaces]]
binding = "MEMORY"
id = "38ac82d5c62e4f16b04f2f62187b3fea"

# Secret (NON nel file — si mettono da CLI):
#   printf '%s' 'gsk_...'  | npx --yes wrangler secret put GROQ_API_KEY
#   printf '%s' 'AIza...'  | npx --yes wrangler secret put GEMINI_API_KEY
#   printf '%s' 'passphrase-lunga' | npx --yes wrangler secret put ADMIN_TOKEN
